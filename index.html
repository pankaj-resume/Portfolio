<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pankaj Portfolio</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

/* BODY */
body{
  background:#0f172a;
  color:white;
}

/* NAVBAR */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#1e293b;
}

nav h2{
  color:#38bdf8;
}

nav a{
  color:white;
  margin-left:15px;
  text-decoration:none;
}

nav a:hover{
  color:#38bdf8;
}

/* HERO SECTION */
.hero{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:60px 20px;
}

/* IMAGE */
.hero img{
  width:140px;
  border-radius:50%;
  margin-bottom:20px;
  border:3px solid #38bdf8;
}

/* TEXT */
.hero h1{
  font-size:28px;
}

.hero span{
  color:#38bdf8;
}

.hero p{
  margin:10px 0;
  color:#cbd5f5;
}

/* BUTTONS */
.btn{
  display:inline-block;
  margin:10px;
  padding:10px 20px;
  border-radius:8px;
  text-decoration:none;
  transition:0.3s;
}

.btn-primary{
  background:#38bdf8;
  color:black;
}

.btn-primary:hover{
  background:#0ea5e9;
}

.btn-outline{
  border:1px solid white;
  color:white;
}

.btn-outline:hover{
  background:white;
  color:black;
}

/* ANIMATION */
.fade{
  animation:fadeIn 1.5s ease-in;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* MOBILE */
@media(max-width:600px){
  .hero h1{
    font-size:22px;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h2>Pankaj</h2>
  <div>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="skills.html">Skills</a>
    <a href="project.html">Projects</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero fade">

  <img src="IMG-20260111-WA0063.jpg" alt="Pankaj">

  <h1>Hi, I'm <span>Pankaj Deka</span></h1>

  <p>Web Designer & Web Developer</p>

  <p>
    I create modern, responsive and user-friendly websites using HTML, CSS, JavaScript and AI tools.
  </p>

  <div>
    <a href="project.html" class="btn btn-primary">View Work</a>
    <a href="contact.html" class="btn btn-outline">Hire Me</a>
  </div>

</section>
<hr><hr /><hr />
<br>

<img src="IMG-20260322-WA0001.jpg" width="490px" height="auto"/>
</body>
</html>
