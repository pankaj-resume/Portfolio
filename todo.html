<!DOCTYPE html>
<html>
<head>
  <title>Task Manager Ultimate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- jsPDF + XLSX -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
  background:linear-gradient(135deg,#0f172a,#1e293b);
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;color:white;
}

.app{
  background:#0f172a;padding:20px;border-radius:20px;
  width:100%;max-width:450px;
  animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(40px);}
  to{opacity:1;}
}

input,select,button{
  width:100%;padding:10px;margin-top:8px;
  border-radius:10px;border:none;
}

button{cursor:pointer;font-weight:bold;}
button:active{transform:scale(0.95);}

.add{background:#22c55e;color:white;}
.clear{background:#ef4444;color:white;}
.download{background:#3b82f6;color:white;}

li{
  background:#1e293b;padding:10px;margin-top:8px;
  border-radius:10px;animation:slide 0.3s;
}

@keyframes slide{
  from{transform:translateX(-30px);opacity:0;}
}

.done{text-decoration:line-through;opacity:0.6;}

small{color:#94a3b8;}
</style>
</head>

<body>

<div class="app">
<h2>📝 Task Ultimate</h2>

<p id="counter"></p>

<input id="task" placeholder="Enter task">
<input type="date" id="date">

<select id="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<button class="add" onclick="addTask()">Add Task</button>

<button class="clear" onclick="clearAll()">Clear All</button>

<button class="download" onclick="downloadTXT()">Download TXT</button>
<button class="download" onclick="downloadPDF()">Download PDF</button>
<button class="download" onclick="downloadExcel()">Download Excel</button>

<ul id="list"></ul>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function save(){
  localStorage.setItem("tasks",JSON.stringify(tasks));
}

function show(){
  let list=document.getElementById("list");
  list.innerHTML="";

  tasks.forEach((t,i)=>{
    let li=document.createElement("li");

    li.innerHTML=`
    <span class="${t.done?'done':''}" onclick="toggle(${i})">${t.text}</span>
    <br>
    <small>${t.date||"No date"} | ${t.priority}</small>
    <br>
    <button onclick="del(${i})">X</button>
    `;

    list.appendChild(li);
  });

  document.getElementById("counter").innerText=
  "Total:"+tasks.length+" Done:"+tasks.filter(t=>t.done).length;
}

function addTask(){
  let text=task.value;
  if(!text)return alert("Enter task");

  tasks.push({
    text,
    date:date.value,
    priority:priority.value,
    done:false
  });

  task.value="";date.value="";
  save();show();
}

function del(i){
  tasks.splice(i,1);
  save();show();
}

function toggle(i){
  tasks[i].done=!tasks[i].done;
  save();show();
}

function clearAll(){
  if(confirm("Delete all?")){
    tasks=[];save();show();
  }
}

//////////////// TXT //////////////////
function downloadTXT(){
  let data="TASK DATA\n\n";

  tasks.forEach((t,i)=>{
    data+=`Task ${i+1}\n${t.text}\n${t.date}\n${t.priority}\n${t.done?"Done":"Pending"}\n\n`;
  });

  let blob=new Blob([data],{type:"text/plain"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="tasks.txt";
  a.click();
}

//////////////// PDF //////////////////
function downloadPDF(){
  const { jsPDF } = window.jspdf;
  let doc=new jsPDF();

  let y=10;

  tasks.forEach((t,i)=>{
    doc.text(`Task ${i+1}: ${t.text}`,10,y);
    y+=7;
    doc.text(`Date: ${t.date}`,10,y);
    y+=7;
    doc.text(`Priority: ${t.priority}`,10,y);
    y+=7;
    doc.text(`Status: ${t.done?"Done":"Pending"}`,10,y);
    y+=10;
  });

  doc.save("tasks.pdf");
}

//////////////// EXCEL //////////////////
function downloadExcel(){
  let data = tasks.map(t=>({
    Task:t.text,
    Date:t.date,
    Priority:t.priority,
    Status:t.done?"Done":"Pending"
  }));

  let ws = XLSX.utils.json_to_sheet(data);
  let wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Tasks");

  XLSX.writeFile(wb, "tasks.xlsx");
}

show();
</script>

</body>
</html>
