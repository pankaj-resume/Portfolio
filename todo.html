<!DOCTYPE html>
<html>
<head>
  <title>Task Manager Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .app {
      background: #0f172a;
      padding: 20px;
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    #counter {
      text-align: center;
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 10px;
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 14px;
      width: 100%;
      margin-top: 10px;
    }

    .add-btn {
      background: #22c55e;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
      font-weight: bold;
    }

    ul {
      margin-top: 15px;
    }

    li {
      background: #1e293b;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 10px;
    }

    .task-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .task-text {
      cursor: pointer;
    }

    .done {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .buttons {
      display: flex;
      gap: 6px;
    }

    .edit-btn {
      background: #f59e0b;
      border: none;
      padding: 5px 8px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    .delete-btn {
      background: #ef4444;
      border: none;
      padding: 5px 8px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    small {
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <div class="app">
    <h1>📝 Task Manager</h1>

    <p id="counter"></p>

    <input type="text" id="search" placeholder="🔍 Search task..." onkeyup="searchTask()">

    <input type="text" id="task" placeholder="Enter your task...">
    <input type="date" id="date">

    <button class="add-btn" onclick="addTask()">+ Add Task</button>

    <ul id="list"></ul>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    function saveData() {
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function updateCounter() {
      let total = tasks.length;
      let completed = tasks.filter(task => task.done).length;

      document.getElementById("counter").innerText =
        `Total: ${total} | Completed: ${completed}`;
    }

    function showTasks() {
      let list = document.getElementById("list");
      list.innerHTML = "";

      tasks.forEach((task, index) => {
        let li = document.createElement("li");

        li.innerHTML = `
          <div class="task-top">
            <span class="task-text ${task.done ? 'done' : ''}" onclick="toggleDone(${index})">
              ${task.text}
            </span>
            <div class="buttons">
              <button class="edit-btn" onclick="editTask(${index})">Edit</button>
              <button class="delete-btn" onclick="deleteTask(${index})">X</button>
            </div>
          </div>
          <small>${task.date || "No date"}</small>
        `;

        list.appendChild(li);
      });

      updateCounter();
    }

    function addTask() {
      let text = document.getElementById("task").value;
      let date = document.getElementById("date").value;

      if (text === "") return;

      tasks.push({ text, date, done: false });
      saveData();

      document.getElementById("task").value = "";
      document.getElementById("date").value = "";

      showTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      saveData();
      showTasks();
    }

    function toggleDone(index) {
      tasks[index].done = !tasks[index].done;
      saveData();
      showTasks();
    }

    function editTask(index) {
      let newTask = prompt("Edit task:", tasks[index].text);
      if (newTask) {
        tasks[index].text = newTask;
        saveData();
        showTasks();
      }
    }

    function searchTask() {
      let value = document.getElementById("search").value.toLowerCase();
      let items = document.querySelectorAll("li");

      items.forEach(item => {
        let text = item.innerText.toLowerCase();

        item.style.display = text.includes(value) ? "block" : "none";
      });
    }

    showTasks();
  </script>

</body>
</html>
